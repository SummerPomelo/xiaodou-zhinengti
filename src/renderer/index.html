<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src blob: *; script-src 'self' 'unsafe-eval' 'unsafe-inline' *; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' *; font-src 'self' data: *; img-src 'self' data: file: * blob:; media-src 'self' file:; frame-src * file:" />
    <title>小豆智能体</title>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #1a1a1a;
      }

      #spinner {
        position: fixed;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 24px;
        background: #1a1a1a;
      }

      #spinner img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        animation: pulse 1.5s ease-in-out infinite;
      }

      #spinner .brand-name {
        font-size: 22px;
        font-weight: 600;
        color: #e0e0e0;
        letter-spacing: 4px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      #spinner .loading-bar {
        width: 160px;
        height: 3px;
        background: #333;
        border-radius: 2px;
        overflow: hidden;
      }

      #spinner .loading-bar::after {
        content: '';
        display: block;
        width: 40%;
        height: 100%;
        background: #7E47F9;
        border-radius: 2px;
        animation: loading-slide 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }

      @keyframes loading-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="spinner">
      <img src="/src/assets/images/logo.png" />
      <div class="brand-name">小豆智能体</div>
      <div class="loading-bar"></div>
    </div>
    <script>
      console.time('init')
    </script>
    <script type="module" src="/src/init.ts"></script>
    <script type="module" src="/src/entryPoint.tsx"></script>
  
</body>
</html>
